<h2> Mis Favoritos</h2>

@if (favorites.length > 0) {
<ul>
    @for (player of favorites; track player.id) {
    <li>
        {{ player.name }} - {{ player.team_name }} ({{ player.team_city }})

        <button (click)="remove(player.id)">❌</button>
    </li>
    }
</ul>
} @else {
<p>No tienes favoritos aún</p>
}
